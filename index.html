<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- SEO -->
    <meta name="description" content="Moderner Klassen-Dienstplan mit Cloud-Sync und Offline-Unterstuetzung">
    <meta name="theme-color" content="#4f46e5">
    <meta name="color-scheme" content="light dark">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dienstplan">
    <meta name="apple-touch-fullscreen" content="yes">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
    <link rel="manifest" href="manifest.json">

    <!-- Title -->
    <title>Dienstplan 2026</title>

    <!-- CDN Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        /* ========== GLOBAL RESET ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior-y: contain;
            /* Safe area insets for iPad notch / home indicator */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-fade-in { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-slide-in { animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-scale-in { animation: scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-spin-slow { animation: spin-slow 2s linear infinite; }

        /* Staggered children */
        .stagger-children > * { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .stagger-children > *:nth-child(1) { animation-delay: 0.03s; }
        .stagger-children > *:nth-child(2) { animation-delay: 0.06s; }
        .stagger-children > *:nth-child(3) { animation-delay: 0.09s; }
        .stagger-children > *:nth-child(4) { animation-delay: 0.12s; }
        .stagger-children > *:nth-child(5) { animation-delay: 0.15s; }
        .stagger-children > *:nth-child(6) { animation-delay: 0.18s; }

        /* ========== CARD EFFECTS ========== */
        .card {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
        }
        .card:active {
            transform: scale(0.97);
        }
        @media (hover: hover) {
            .card:hover {
                transform: translateY(-3px);
                box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.12), 0 8px 16px -8px rgba(0, 0, 0, 0.08);
            }
        }
        .dark .card:hover {
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6), 0 8px 16px -8px rgba(0, 0, 0, 0.3);
        }

        /* ========== GLASS MORPHISM ========== */
        .glass {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.72);
        }

        /* ========== SKELETON SHIMMER ========== */
        .skeleton-shimmer {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        .dark .skeleton-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
        }

        /* ========== TOUCH TARGETS ========== */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* ========== STATUS BAR PLACEHOLDER ========== */
        .status-bar-spacer {
            height: env(safe-area-inset-top, 0px);
        }

        /* ========== INSTALL PROMPT ========== */
        .install-banner {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* ========== PRINT ========== */
        @media print {
            .no-print { display: none !important; }
            body { padding: 0 !important; }
            .card { break-inside: avoid; box-shadow: none; border: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, useCallback, useRef } = React;

        // ==================== CONFIG ====================
        const BIN_ID = "694007d2d0ea881f402ae23e";
        const API_KEY = "$2a$10$vkil.dy/TZnGQ8xlENj2L.iHbKVWGSuJhXREXsM8OS8NthsCsI8Di";
        const ADMIN_PASS = "1234";

        const STUDENTS = [
            "Hasan", "Saif",
            "Romana", "Zoya",
            "Mika", "Emir",
            "Emilia", "Sama",
            "Marigona", "Celine",
            "Jacob Robert", "Hamid",
            "Lara", "Pia",
            "Elisaveta", "Nele",
            "Dejan", "Phillip",
            "Tristan", "Alieu",
            "Patricia", "Suleiman",
            "Leyla", "Placeholder",
            "Adrian", "Tyron"
        ];

        const CONFIG = {
            startDate: new Date('2026-01-12'),
            endDate: new Date('2026-07-02'),
            duties: [
                { id: 'tafel', name: 'Tafel', icon: '🧽', color: 'blue', desc: 'Nach jeder Stunde wischen' },
                { id: 'fegen', name: 'Fegen', icon: '🧹', color: 'orange', desc: 'Raum am Ende fegen' },
                { id: 'austeilen', name: 'Austeilen', icon: '📄', color: 'amber', desc: 'Material verteilen' },
                { id: 'supervisor', name: 'Supervisor', icon: '🦅', color: 'purple', desc: 'Kontrolle & Hilfe', check: true },
                { id: 'handy', name: 'Handy Hotel', icon: '📱', color: 'cyan', desc: 'Morgens einsammeln', daily: true },
                { id: 'muell', name: 'Muell', icon: '🗑️', color: 'slate', desc: 'Muell trennen' }
            ]
        };

        const WEEKDAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr'];

        const COLORS = {
            blue: { bg: 'bg-blue-50 dark:bg-blue-950/40', border: 'border-blue-200/60 dark:border-blue-800/40', text: 'text-blue-700 dark:text-blue-300', accent: 'bg-blue-500', light: 'bg-blue-100 dark:bg-blue-900/30' },
            orange: { bg: 'bg-orange-50 dark:bg-orange-950/40', border: 'border-orange-200/60 dark:border-orange-800/40', text: 'text-orange-700 dark:text-orange-300', accent: 'bg-orange-500', light: 'bg-orange-100 dark:bg-orange-900/30' },
            amber: { bg: 'bg-amber-50 dark:bg-amber-950/40', border: 'border-amber-200/60 dark:border-amber-800/40', text: 'text-amber-700 dark:text-amber-300', accent: 'bg-amber-500', light: 'bg-amber-100 dark:bg-amber-900/30' },
            purple: { bg: 'bg-purple-50 dark:bg-purple-950/40', border: 'border-purple-200/60 dark:border-purple-800/40', text: 'text-purple-700 dark:text-purple-300', accent: 'bg-purple-500', light: 'bg-purple-100 dark:bg-purple-900/30' },
            cyan: { bg: 'bg-cyan-50 dark:bg-cyan-950/40', border: 'border-cyan-200/60 dark:border-cyan-800/40', text: 'text-cyan-700 dark:text-cyan-300', accent: 'bg-cyan-500', light: 'bg-cyan-100 dark:bg-cyan-900/30' },
            slate: { bg: 'bg-slate-50 dark:bg-slate-900/40', border: 'border-slate-200/60 dark:border-slate-700/40', text: 'text-slate-700 dark:text-slate-300', accent: 'bg-slate-500', light: 'bg-slate-100 dark:bg-slate-800/30' }
        };

        // ==================== UTILS ====================
        const Utils = {
            formatDate: (d) => d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' }),
            getWeekId: (idx) => `W${idx}`,
            calculateWeekDiff: (now, start) => {
                if (now < start) return 0;
                const diff = Math.abs(now - start);
                return Math.floor(Math.ceil(diff / (1000 * 60 * 60 * 24)) / 7);
            },
            generateRotation: (weekOffset, studentList) => {
                // Build pairs from the student list (pairs are consecutive in the list)
                const pairs = [];
                for (let i = 0; i < studentList.length; i += 2) {
                    if (i + 1 < studentList.length) {
                        pairs.push([studentList[i], studentList[i + 1]]);
                    } else {
                        pairs.push([studentList[i]]);
                    }
                }
                // Rotate the pairs by 1 per week (pairs stay together, duty changes)
                const shift = weekOffset % pairs.length;
                const rotated = pairs.map((_, i) => {
                    let index = (i - shift) % pairs.length;
                    if (index < 0) index += pairs.length;
                    return pairs[index];
                });
                return rotated;
            },
            getInitials: (name) => name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2),
            getAvatarColor: (name) => {
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
                const hues = ['indigo', 'violet', 'rose', 'emerald', 'sky', 'amber', 'fuchsia', 'teal'];
                return hues[Math.abs(hash) % hues.length];
            }
        };

        // ==================== TOAST CONTEXT ====================
        const ToastContext = createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const addToast = useCallback((message, type = 'info') => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3200);
            }, []);

            const icons = { success: '✓', error: '✕', info: 'i', warning: '!' };
            const colorMap = {
                success: 'bg-emerald-500 border-emerald-400/50',
                error: 'bg-red-500 border-red-400/50',
                info: 'bg-indigo-500 border-indigo-400/50',
                warning: 'bg-amber-500 border-amber-400/50'
            };

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 sm:left-auto sm:right-6 sm:translate-x-0 z-[9999] flex flex-col gap-2 no-print">
                        {toasts.map(t => (
                            <div key={t.id} className={`animate-slide-in ${colorMap[t.type]} text-white px-5 py-3 rounded-2xl shadow-2xl border flex items-center gap-3 min-w-[260px] max-w-[360px]`}>
                                <div className="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center font-bold text-sm flex-shrink-0">
                                    {icons[t.type]}
                                </div>
                                <span className="font-medium text-sm leading-snug">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const useToast = () => useContext(ToastContext);

        // ==================== COMPONENTS ====================

        // Avatar Component
        const Avatar = ({ name, size = 'md', isSick = false }) => {
            const color = Utils.getAvatarColor(name);
            const initials = Utils.getInitials(name);
            const sizes = { sm: 'w-8 h-8 text-xs', md: 'w-10 h-10 text-sm', lg: 'w-12 h-12 text-base' };
            const ring = isSick ? 'ring-2 ring-red-400 dark:ring-red-500' : '';
            return (
                <div className={`${sizes[size]} rounded-xl ${ring} flex items-center justify-center font-bold text-white bg-${color}-500 flex-shrink-0 select-none`}>
                    {isSick ? '🤒' : initials}
                </div>
            );
        };

        // Modal Component
        const Modal = ({ isOpen, onClose, title, children, icon }) => {
            const modalRef = useRef(null);
            useEffect(() => {
                if (isOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
                return () => { document.body.style.overflow = ''; };
            }, [isOpen]);

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[9000] flex items-end sm:items-center justify-center p-0 sm:p-4 no-print" onClick={onClose}>
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-fade-in"></div>
                    <div
                        ref={modalRef}
                        className="relative bg-white dark:bg-slate-800 w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl shadow-2xl animate-slide-up max-h-[90vh] overflow-y-auto"
                        style={{ paddingBottom: 'env(safe-area-inset-bottom, 16px)' }}
                        onClick={e => e.stopPropagation()}
                    >
                        <div className="flex justify-center pt-3 pb-1 sm:hidden">
                            <div className="w-10 h-1 rounded-full bg-slate-300 dark:bg-slate-600"></div>
                        </div>
                        <div className="px-6 pt-2 pb-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                {icon && <span className="text-2xl">{icon}</span>}
                                <h3 className="font-bold text-lg">{title}</h3>
                            </div>
                            <button onClick={onClose} className="touch-target w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        // Loading Skeleton
        const Skeleton = () => (
            <div className="min-h-screen flex items-center justify-center p-6">
                <div className="w-full max-w-4xl">
                    <div className="skeleton-shimmer h-14 rounded-2xl w-full mb-8"></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        {[...Array(6)].map((_, i) => (
                            <div key={i} className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-100 dark:border-slate-800">
                                <div className="animate-pulse space-y-4">
                                    <div className="flex items-center gap-3">
                                        <div className="skeleton-shimmer w-10 h-10 rounded-xl"></div>
                                        <div className="flex-1">
                                            <div className="skeleton-shimmer h-4 rounded-lg w-24 mb-2"></div>
                                            <div className="skeleton-shimmer h-3 rounded-lg w-36"></div>
                                        </div>
                                    </div>
                                    <div className="space-y-2 pt-2">
                                        <div className="skeleton-shimmer h-12 rounded-xl"></div>
                                        <div className="skeleton-shimmer h-12 rounded-xl"></div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // Install Prompt Banner
        const InstallPrompt = ({ onDismiss }) => {
            const [show, setShow] = useState(false);
            const deferredPrompt = useRef(null);

            useEffect(() => {
                const handler = (e) => {
                    e.preventDefault();
                    deferredPrompt.current = e;
                    // Show after a short delay
                    const dismissed = localStorage.getItem('installDismissed');
                    if (!dismissed) {
                        setTimeout(() => setShow(true), 2000);
                    }
                };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = async () => {
                if (deferredPrompt.current) {
                    deferredPrompt.current.prompt();
                    const result = await deferredPrompt.current.userChoice;
                    if (result.outcome === 'accepted') {
                        setShow(false);
                    }
                    deferredPrompt.current = null;
                }
            };

            const handleDismiss = () => {
                setShow(false);
                localStorage.setItem('installDismissed', 'true');
                onDismiss?.();
            };

            if (!show) return null;

            return (
                <div className="install-banner fixed bottom-20 left-4 right-4 sm:left-auto sm:right-6 sm:bottom-6 sm:w-80 z-[8000] no-print">
                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 p-4 flex items-center gap-4">
                        <img src="icons/icon-120.png" alt="" className="w-12 h-12 rounded-xl flex-shrink-0" />
                        <div className="flex-1 min-w-0">
                            <div className="font-bold text-sm">Dienstplan installieren</div>
                            <div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Als App auf dem iPad speichern</div>
                        </div>
                        <div className="flex gap-2 flex-shrink-0">
                            <button onClick={handleDismiss} className="text-xs font-medium text-slate-500 px-2 py-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
                                Nein
                            </button>
                            <button onClick={handleInstall} className="text-xs font-bold text-white bg-indigo-500 hover:bg-indigo-600 px-3 py-1.5 rounded-xl transition-colors">
                                OK
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const [currentWeek, setCurrentWeek] = useState(0);
            const [isAdmin, setIsAdmin] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [modals, setModals] = useState({ login: false, sick: false, settings: false });
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [data, setData] = useState({ checklist: {}, sickLog: {} });
            const [syncStatus, setSyncStatus] = useState('connecting');
            const [isLoaded, setIsLoaded] = useState(false);
            const [showTodayBadge, setShowTodayBadge] = useState(false);
            const { addToast } = useToast();

            // Dark Mode
            useEffect(() => {
                const saved = localStorage.getItem('darkMode');
                if (saved === 'true' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    setDarkMode(true);
                }
            }, []);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            // Load Data
            useEffect(() => {
                const init = async () => {
                    try {
                        const local = localStorage.getItem('dienstplan_v2');
                        if (local) setData(JSON.parse(local));

                        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                            headers: { 'X-Master-Key': API_KEY }
                        });

                        if (res.ok) {
                            const json = await res.json();
                            const cloud = json.record || json;
                            setData({ checklist: cloud.checklist || {}, sickLog: cloud.sickLog || {} });
                            setSyncStatus('online');
                            addToast("Cloud-Sync aktiv", "success");
                        }
                    } catch (e) {
                        setSyncStatus('offline');
                        addToast("Offline-Modus", "info");
                    } finally {
                        setIsLoaded(true);
                        const now = new Date();
                        const weeks = Utils.calculateWeekDiff(now, CONFIG.startDate);
                        setCurrentWeek(weeks);
                    }
                };
                init();
            }, []);

            // Register Service Worker
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js').catch(() => {});
                }
            }, []);

            // Auto-Save
            useEffect(() => {
                if (!isLoaded) return;
                localStorage.setItem('dienstplan_v2', JSON.stringify(data));

                const timer = setTimeout(async () => {
                    if (syncStatus === 'offline') return;
                    try {
                        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                            body: JSON.stringify(data)
                        });
                        setSyncStatus('online');
                    } catch (e) {
                        setSyncStatus('offline');
                    }
                }, 2000);

                return () => clearTimeout(timer);
            }, [data, isLoaded]);

            // Generate Roster
            const roster = useMemo(() => {
                const rotatedPairs = Utils.generateRotation(currentWeek, STUDENTS);
                const assignments = [];
                let idx = 0;
                CONFIG.duties.forEach(duty => {
                    if (idx < rotatedPairs.length) {
                        assignments.push({ duty, pair: rotatedPairs[idx] });
                        idx += 1;
                    }
                });
                // Pause = remaining pairs (flattened)
                const pause = rotatedPairs.slice(idx).flat();
                return { assignments, pause };
            }, [currentWeek]);

            const weekDates = useMemo(() => {
                const start = new Date(CONFIG.startDate);
                start.setDate(start.getDate() + (currentWeek * 7));
                const end = new Date(start);
                end.setDate(start.getDate() + 4);
                return { start, end };
            }, [currentWeek]);

            const weekId = Utils.getWeekId(currentWeek);

            // Check if we're viewing current week
            const isCurrentWeek = useMemo(() => {
                const now = new Date();
                const weeks = Utils.calculateWeekDiff(now, CONFIG.startDate);
                return currentWeek === weeks;
            }, [currentWeek]);

            // Actions
            const handleLogin = (pwd) => {
                if (pwd === ADMIN_PASS) {
                    setIsAdmin(true);
                    setModals({ ...modals, login: false });
                    addToast("Admin-Modus aktiv", "success");
                } else {
                    addToast("Falsches Passwort", "error");
                }
            };

            const openSickModal = (student) => {
                if (!isAdmin) {
                    setModals({ ...modals, login: true });
                    return;
                }
                setSelectedStudent(student);
                setModals({ ...modals, sick: true });
            };

            const updateSick = (isSick, substitute) => {
                const key = `${weekId}-${selectedStudent}`;
                const newData = { ...data };
                if (isSick) {
                    newData.sickLog = { ...newData.sickLog, [key]: { isSick: true, substitute } };
                } else {
                    const newSickLog = { ...newData.sickLog };
                    delete newSickLog[key];
                    newData.sickLog = newSickLog;
                }
                setData(newData);
                setModals({ ...modals, sick: false });
                addToast(isSick ? "Als krank markiert" : "Gesund markiert", "success");
            };

            const toggleCheck = (id) => {
                setData(prev => ({
                    ...prev,
                    checklist: { ...prev.checklist, [id]: !prev.checklist[id] }
                }));
            };

            const exportData = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `dienstplan_backup_${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                addToast("Backup heruntergeladen", "success");
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const json = JSON.parse(ev.target.result);
                        if (json.checklist && json.sickLog) {
                            setData(json);
                            addToast("Backup geladen", "success");
                            setModals({ ...modals, settings: false });
                        } else {
                            addToast("Ungueltige Datei", "error");
                        }
                    } catch {
                        addToast("Fehler beim Lesen", "error");
                    }
                    e.target.value = '';
                };
                reader.readAsText(file);
            };

            const getSick = (student) => {
                return data.sickLog[`${weekId}-${student}`] || null;
            };

            const goToday = () => {
                const weeks = Utils.calculateWeekDiff(new Date(), CONFIG.startDate);
                setCurrentWeek(weeks);
            };

            if (!isLoaded) return <Skeleton />;

            const isEnded = new Date() > CONFIG.endDate;

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="relative z-40 bg-white dark:bg-slate-950 border-b border-slate-200/50 dark:border-slate-800/50 no-print">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3">
                            <div className="flex justify-between items-center gap-3">
                                {/* Logo */}
                                <div className="flex items-center gap-3 min-w-0">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/25 flex-shrink-0">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 14l2 2 4-4"/></svg>
                                    </div>
                                    <div className="hidden sm:block min-w-0">
                                        <h1 className="text-lg font-extrabold tracking-tight truncate">Dienstplan</h1>
                                        <div className="flex items-center gap-2 mt-0.5">
                                            <div className={`w-1.5 h-1.5 rounded-full ${syncStatus === 'online' ? 'bg-emerald-500' : 'bg-slate-400'} ${syncStatus === 'connecting' ? 'animate-pulse' : ''}`}></div>
                                            <span className="text-xs font-medium text-slate-500 dark:text-slate-400">
                                                {syncStatus === 'online' ? 'Synchronisiert' : syncStatus === 'connecting' ? 'Verbinde...' : 'Offline'}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                {/* Week Navigation */}
                                <div className="flex items-center gap-1.5 bg-slate-100/80 dark:bg-slate-800/80 rounded-2xl p-1 backdrop-blur-sm">
                                    <button onClick={() => setCurrentWeek(c => Math.max(0, c - 1))}
                                        className="touch-target w-9 h-9 rounded-xl hover:bg-white dark:hover:bg-slate-700 transition-all flex items-center justify-center text-slate-600 dark:text-slate-300 disabled:opacity-30 disabled:cursor-not-allowed active:scale-95"
                                        disabled={currentWeek === 0}>
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                                    </button>

                                    <button onClick={goToday}
                                        className="px-3 text-center min-w-[130px] py-1 rounded-xl hover:bg-white dark:hover:bg-slate-700 transition-all active:scale-95">
                                        <div className="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">
                                            Woche {currentWeek + 1}
                                            {isCurrentWeek && (
                                                <span className="ml-1.5 inline-flex items-center px-1.5 py-0.5 rounded-md bg-indigo-500 text-white text-[9px] font-bold">
                                                    HEUTE
                                                </span>
                                            )}
                                        </div>
                                        <div className="text-xs font-semibold text-slate-700 dark:text-slate-200 mt-0.5">
                                            {Utils.formatDate(weekDates.start)} – {Utils.formatDate(weekDates.end)}
                                        </div>
                                    </button>

                                    <button onClick={() => setCurrentWeek(c => c + 1)}
                                        className="touch-target w-9 h-9 rounded-xl hover:bg-white dark:hover:bg-slate-700 transition-all flex items-center justify-center text-slate-600 dark:text-slate-300 active:scale-95">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                                    </button>
                                </div>

                                {/* Actions */}
                                <div className="flex items-center gap-1">
                                    <button onClick={() => setDarkMode(!darkMode)}
                                        className="touch-target w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all flex items-center justify-center active:scale-95">
                                        {darkMode ? (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                                        ) : (
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                                        )}
                                    </button>
                                    <button onClick={() => setModals({ ...modals, settings: true })}
                                        className="touch-target w-10 h-10 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all flex items-center justify-center active:scale-95">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 max-w-6xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-8">
                        {isEnded ? (
                            <div className="flex flex-col items-center justify-center py-24 text-center animate-fade-in">
                                <div className="w-24 h-24 bg-gradient-to-br from-amber-400 to-orange-500 rounded-3xl flex items-center justify-center text-5xl shadow-2xl shadow-orange-500/30 mb-6">
                                    🎉
                                </div>
                                <h2 className="text-3xl sm:text-4xl font-extrabold text-slate-900 dark:text-white mb-2">Schoene Ferien!</h2>
                                <p className="text-lg text-slate-500 dark:text-slate-400">Das Schuljahr ist beendet</p>
                            </div>
                        ) : (
                            <>
                                {/* Duty Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5 mb-6 stagger-children">
                                    {roster.assignments.map(({ duty, pair }) => {
                                        const c = COLORS[duty.color];
                                        return (
                                            <div key={duty.id} className={`card bg-white dark:bg-slate-800/90 rounded-2xl p-5 border ${c.border} shadow-sm`}>
                                                {/* Card Header */}
                                                <div className="flex items-center gap-3 mb-4">
                                                    <div className={`w-11 h-11 ${c.light} rounded-xl flex items-center justify-center text-2xl flex-shrink-0`}>
                                                        {duty.icon}
                                                    </div>
                                                    <div className="min-w-0">
                                                        <h3 className={`text-base font-bold ${c.text}`}>{duty.name}</h3>
                                                        <p className="text-[11px] text-slate-400 dark:text-slate-500 font-medium mt-0.5">{duty.desc}</p>
                                                    </div>
                                                </div>

                                                {/* Students */}
                                                <div className="space-y-2 mb-4">
                                                    {pair.map((student, idx) => {
                                                        const sick = getSick(student);
                                                        const isSick = !!sick;
                                                        return (
                                                            <button key={idx} onClick={() => openSickModal(student)}
                                                                className={`touch-target w-full text-left p-3 rounded-xl border-2 transition-all flex items-center gap-3 ${
                                                                    isSick
                                                                        ? 'bg-red-50/80 border-red-200 dark:bg-red-950/20 dark:border-red-800/50'
                                                                        : `${c.bg} ${c.border} hover:border-indigo-300 dark:hover:border-indigo-600 active:scale-[0.98]`
                                                                }`}>
                                                                <Avatar name={student} isSick={isSick} />
                                                                <div className="flex-1 min-w-0">
                                                                    <div className={`font-semibold text-sm truncate ${isSick ? 'line-through text-red-500 dark:text-red-400' : 'text-slate-800 dark:text-slate-100'}`}>
                                                                        {student}
                                                                    </div>
                                                                    {isSick && sick.substitute && (
                                                                        <div className="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">
                                                                            Ersatz: {sick.substitute}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                {isSick && (
                                                                    <span className="text-sm">🤒</span>
                                                                )}
                                                            </button>
                                                        );
                                                    })}
                                                </div>

                                                {/* Checks */}
                                                {duty.check && (
                                                    <label className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors touch-target">
                                                        <span className="text-sm font-medium text-slate-600 dark:text-slate-400">Erledigt?</span>
                                                        <div className={`w-11 h-6 rounded-full transition-colors flex items-center px-0.5 ${data.checklist[`${weekId}-${duty.id}`] ? 'bg-indigo-500' : 'bg-slate-300 dark:bg-slate-600'}`}
                                                            onClick={() => toggleCheck(`${weekId}-${duty.id}`)}>
                                                            <div className={`w-5 h-5 bg-white rounded-full shadow-sm transition-transform ${data.checklist[`${weekId}-${duty.id}`] ? 'translate-x-5' : 'translate-x-0'}`}></div>
                                                        </div>
                                                    </label>
                                                )}

                                                {duty.daily && (
                                                    <div className="grid grid-cols-5 gap-1.5 mt-1">
                                                        {WEEKDAYS.map((day, i) => {
                                                            const isChecked = !!data.checklist[`${weekId}-${duty.id}-${i}`];
                                                            return (
                                                                <button key={i} onClick={() => toggleCheck(`${weekId}-${duty.id}-${i}`)}
                                                                    className={`touch-target flex flex-col items-center gap-1.5 py-2 rounded-xl transition-all active:scale-95 ${isChecked ? 'bg-indigo-500 text-white' : 'bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900'}`}>
                                                                    <span className="text-[10px] font-bold uppercase">{day}</span>
                                                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ${isChecked ? 'border-white/50 bg-white/20' : 'border-slate-300 dark:border-slate-600'}`}>
                                                                        {isChecked && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={isChecked ? 'white' : 'currentColor'} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                                                                    </div>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Pause / Reserve Section */}
                                <div className="bg-gradient-to-br from-emerald-50 to-teal-50 dark:from-emerald-950/30 dark:to-teal-950/20 border border-emerald-200/60 dark:border-emerald-800/30 rounded-2xl p-5 sm:p-6 shadow-sm animate-fade-in">
                                    <div className="flex items-center gap-4 mb-5">
                                        <div className="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-500 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/25 flex-shrink-0">
                                            ☕
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-bold text-emerald-900 dark:text-emerald-100">Pause & Reserve</h3>
                                            <p className="text-sm text-emerald-700/70 dark:text-emerald-300/60 font-medium">{roster.pause.length} Schueler frei</p>
                                        </div>
                                    </div>

                                    <div className="flex flex-wrap gap-2">
                                        {roster.pause.map((student, idx) => {
                                            const isSick = !!getSick(student);
                                            const isNext = idx < 2;
                                            return (
                                                <button key={idx} onClick={() => openSickModal(student)}
                                                    className={`touch-target relative px-4 py-2 rounded-xl font-semibold text-sm transition-all active:scale-95 ${
                                                        isSick
                                                            ? 'bg-red-100/80 text-red-600 border border-red-200/60 line-through dark:bg-red-950/30 dark:border-red-800/40 dark:text-red-400'
                                                            : 'bg-white/80 text-emerald-800 border border-emerald-200/60 hover:border-emerald-300 shadow-sm hover:shadow dark:bg-slate-800/80 dark:border-emerald-700/40 dark:text-emerald-300'
                                                    }`}>
                                                    {student}
                                                    {isNext && !isSick && (
                                                        <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-indigo-500 rounded-full ring-2 ring-white dark:ring-slate-800"></span>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {roster.pause.length > 2 && (
                                        <p className="text-xs text-emerald-600/50 dark:text-emerald-400/40 mt-3 font-medium">
                                            Die ersten 2 sind naechste Woche als Erste dran.
                                        </p>
                                    )}
                                </div>
                            </>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="no-print py-4 text-center">
                        <p className="text-xs text-slate-400 dark:text-slate-600 font-medium">
                            Dienstplan 2026 v3.1 · Klassen-Dienstplan
                        </p>
                    </footer>

                    {/* Install Prompt */}
                    <InstallPrompt />

                    {/* Modals */}
                    <Modal isOpen={modals.login} onClose={() => setModals({ ...modals, login: false })} title="Admin-Login" icon="🔐">
                        <form onSubmit={(e) => { e.preventDefault(); handleLogin(e.target.pwd.value); e.target.pwd.value = ''; }}>
                            <p className="text-slate-500 dark:text-slate-400 mb-6 text-center text-sm">
                                Gib das Admin-Passwort ein, um Aenderungen vorzunehmen.
                            </p>
                            <input type="password" name="pwd" autoFocus autoComplete="off"
                                className="touch-target w-full px-4 py-3.5 rounded-xl border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 dark:text-white mb-6 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all text-center font-bold tracking-[0.3em] text-lg"
                                placeholder="····" />
                            <button type="submit"
                                className="touch-target w-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-indigo-500/25">
                                Anmelden
                            </button>
                        </form>
                    </Modal>

                    <Modal isOpen={modals.sick} onClose={() => setModals({ ...modals, sick: false })} title="Krankmeldung" icon="🤒">
                        <div className="text-center mb-6">
                            <Avatar name={selectedStudent || ''} size="lg" isSick />
                            <h3 className="text-xl font-bold text-slate-900 dark:text-white mt-3">{selectedStudent}</h3>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">Krankheit fuer diese Woche melden</p>
                        </div>
                        <div className="space-y-3">
                            <input id="subInput" type="text" placeholder="Name des Ersatzschuelers"
                                defaultValue={getSick(selectedStudent)?.substitute || ''}
                                className="touch-target w-full bg-slate-50 dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 dark:text-white transition-all" />
                            <button onClick={() => updateSick(true, document.getElementById('subInput').value)}
                                className="touch-target w-full bg-gradient-to-r from-red-500 to-rose-500 hover:from-red-600 hover:to-rose-600 text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-red-500/25">
                                Als krank markieren
                            </button>
                            <button onClick={() => updateSick(false)}
                                className="touch-target w-full bg-gradient-to-r from-emerald-500 to-green-500 hover:from-emerald-600 hover:to-green-600 text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-emerald-500/25">
                                Als gesund markieren
                            </button>
                        </div>
                    </Modal>

                    <Modal isOpen={modals.settings} onClose={() => setModals({ ...modals, settings: false })} title="Einstellungen" icon="⚙️">
                        <div className="space-y-4">
                            {/* Admin Status */}
                            <div className="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${isAdmin ? 'bg-indigo-100 dark:bg-indigo-900/30' : 'bg-slate-200 dark:bg-slate-700'}`}>
                                            {isAdmin ? '🔓' : '🔒'}
                                        </div>
                                        <div>
                                            <span className="font-bold text-sm block">{isAdmin ? 'Admin-Modus' : 'Nur-Lese-Modus'}</span>
                                            <span className="text-xs text-slate-400">{isAdmin ? 'Aenderungen erlaubt' : 'Zum Bearbeiten anmelden'}</span>
                                        </div>
                                    </div>
                                    <button onClick={() => isAdmin ? setIsAdmin(false) : setModals({ ...modals, settings: false, login: true })}
                                        className={`touch-target px-4 py-2 rounded-xl font-bold text-xs transition-all active:scale-95 ${isAdmin ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`}>
                                        {isAdmin ? 'Logout' : 'Login'}
                                    </button>
                                </div>
                            </div>

                            {/* Dark Mode Toggle */}
                            <div className="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-slate-200 dark:bg-slate-700 rounded-xl flex items-center justify-center text-lg">
                                        {darkMode ? '🌙' : '☀️'}
                                    </div>
                                    <span className="font-bold text-sm">Erscheinungsbild</span>
                                </div>
                                <button onClick={() => setDarkMode(!darkMode)}
                                    className={`touch-target px-4 py-2 rounded-xl font-bold text-xs transition-all active:scale-95 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600`}>
                                    {darkMode ? 'Hell' : 'Dunkel'}
                                </button>
                            </div>

                            {/* Export */}
                            <button onClick={exportData}
                                className="touch-target w-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white py-3.5 rounded-xl font-bold transition-all active:scale-[0.98] shadow-lg shadow-indigo-500/25 flex items-center justify-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Backup herunterladen
                            </button>

                            {/* Import */}
                            <label className="touch-target w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 py-3.5 rounded-xl font-bold transition-all cursor-pointer flex items-center justify-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                Backup wiederherstellen
                                <input type="file" accept=".json" className="hidden" onChange={importData} />
                            </label>

                            <div className="text-center text-xs text-slate-300 dark:text-slate-700 pt-2 font-medium">
                                Dienstplan 2026 · v3.1.0
                            </div>
                        </div>
                    </Modal>
                </div>
            );
        };

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
